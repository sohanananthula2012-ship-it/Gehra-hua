<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gehra Hua • Dhurandhar</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Noto+Sans+Devanagari:wght@400;500&amp;display=swap');
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f001a, #1a0033);
      color: #fff;
      margin: 0;
      padding: 20px;
      text-align: center;
      min-height: 100vh;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      font-size: 2.8rem;
      margin: 20px 0 8px;
      background: linear-gradient(90deg, #ff99ff, #bb99ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      color: #ccbbff;
      font-size: 1.1rem;
      margin-bottom: 30px;
    }
    audio {
      width: 100%;
      max-width: 620px;
      margin: 20px 0;
      border-radius: 12px;
    }
    .lyrics {
      margin: 30px auto;
      font-family: 'Noto Sans Devanagari', sans-serif;
      font-size: 1.35rem;
      line-height: 1.75;
      min-height: 160px;
      background: rgba(255,255,255,0.06);
      padding: 28px 24px;
      border-radius: 16px;
      border: 1px solid rgba(187, 153, 255, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: all 0.3s ease;
    }
    .download-btn {
      background: linear-gradient(90deg, #9f4bff, #c084fc);
      color: white;
      padding: 14px 32px;
      border: none;
      border-radius: 50px;
      margin: 10px;
      cursor: pointer;
      font-size: 1.05rem;
      font-weight: 600;
      box-shadow: 0 4px 15px rgba(159, 75, 255, 0.4);
      transition: transform 0.2s;
    }
    .download-btn:hover {
      transform: translateY(-3px);
    }
    footer {
      margin-top: 50px;
      font-size: 0.95rem;
      opacity: 0.75;
    }
    .credit {
      margin-top: 10px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Gehra Hua</h1>
    <p class="subtitle">Arijit Singh • Armaan Khan | Dhurandhar</p>

    <audio id="player" controls preload="metadata">
      <source src="Gehra%20Hua%20Dhurandhar%20320%20Kbps.mp3" type="audio/mpeg">
      Your browser does not support the audio element.
    </audio>

    <div class="lyrics" id="lyrics">♪ गहरा हुआ... Lyrics will appear here as you play ♪</div>

    <div>
      <a href="Gehra%20Hua%20Dhurandhar%20320%20Kbps.mp3" download>
        <button class="download-btn">⬇️ Download MP3 (320 Kbps)</button>
      </a>
      <a href="gehra_hua_lyrics.srt" download>
        <button class="download-btn">⬇️ Download SRT Subtitles</button>
      </a>
    </div>

    <footer>
      <p>Made with ❤️ for music lovers</p>
      <div class="credit">
        Lyrics &amp; Frontend by Grok • Song from <strong>Dhurandhar</strong>
      </div>
    </footer>
  </div>

  <script>
    const audio = document.getElementById('player');
    const lyricsDiv = document.getElementById('lyrics');
    
    let cues = [];
    
    // Load and parse SRT
    fetch('gehra_hua_lyrics.srt')
      .then(res => res.text())
      .then(text => {
        cues = parseSRT(text);
      })
      .catch(err => {
        console.error("Failed to load SRT:", err);
        lyricsDiv.textContent = "Error loading lyrics. Please make sure gehra_hua_lyrics.srt is in the same folder.";
      });

    function parseSRT(srtText) {
      const cues = [];
      const blocks = srtText.trim().split(/\n\s*\n/);
      
      blocks.forEach(block => {
        const lines = block.trim().split('\n');
        if (lines.length >= 3) {
          const timeLine = lines[1];
          const [startStr, endStr] = timeLine.split(' --> ');
          if (startStr && endStr) {
            cues.push({
              start: timeToSeconds(startStr),
              end: timeToSeconds(endStr),
              text: lines.slice(2).join('\n').trim()
            });
          }
        }
      });
      return cues;
    }

    function timeToSeconds(timeStr) {
      const [time, ms] = timeStr.replace(',', '.').split('.');
      const [h, m, s] = time.split(':').map(Number);
      return (h || 0) * 3600 + m * 60 + s + (parseFloat('0.' + (ms || '0')));
    }

    // Sync lyrics
    audio.addEventListener('timeupdate', () => {
      if (cues.length === 0) return;
      
      const currentTime = audio.currentTime;
      let activeCue = null;
      
      for (let cue of cues) {
        if (currentTime >= cue.start && currentTime <= cue.end) {
          activeCue = cue;
          break;
        }
      }
      
      if (activeCue) {
        lyricsDiv.textContent = activeCue.text;
      } else {
        lyricsDiv.textContent = "♪ गहरा हुआ... ♪";
      }
    });

    // Bonus: Spacebar to play/pause
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && document.activeElement.tagName !== 'BUTTON') {
        e.preventDefault();
        if (audio.paused) audio.play();
        else audio.pause();
      }
    });
  </script>
</body>
</html>
